<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Calculadora de Barramento</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  margin-right: 260px;
  background: #f0f6ff;
}

.box {
  border: 1px solid #3b82f6;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 8px;
  background: #ffffff;
}

input, select {
  margin: 5px;
  padding: 6px;
  border: 1px solid #3b82f6;
  border-radius: 4px;
}

button {
  padding: 8px 12px;
  cursor: pointer;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 4px;
}

button:hover {
  background: #1d4ed8;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid #93c5fd;
  padding: 8px;
  text-align: center;
}

th {
  background: #1e3a8a;
  color: white;
}

tr:nth-child(even) {
  background: #eff6ff;
}

.ajuda-fixa {
  position: fixed;
  right: 10px;
  top: 10px;
  width: 220px;
  font-size: 12px;
  background: #e0edff;
  border: 1px solid #3b82f6;
}

.total {
  font-size: 20px;
  font-weight: bold;
  color: #1d4ed8;
}

.btn-remover {
  background: #dc2626;
  color: white;
  border: none;
  padding: 4px 8px;
}

.btn-remover:hover {
  background: #b91c1c;
}
</style>

</head>
<body>

<h2>Cálculo de Barramento (kg)</h2>

<div class="box ajuda-fixa">
  <h3>Ajuda</h3>
  <h3>Disjuntor caixa Moldada</h3>
  <p><b>450A:</b> 1 1/4" x 1/4"</p>
  <p><b>250A:</b> 3/4" x 1/4"</p>
  <p><b>125A:</b> 5/8" x 3/16"</p>
  <h3>Minidisjuntor</h3>
  <p><b>63A:</b> 3/8" x 1/16"</p>
  <p><b>100A:</b> 1/2" x 3/16"</p>
</div>

<!-- OPÇÃO RÁPIDA -->
<div class="box">
  <h3>Opção Rápida</h3>

  <select id="modelo">
    <option value="">Selecione</option>
    <option value="1.1/4x1/4">450A</option>
    <option value="3/4x1/4">250A</option>
    <option value="5/8x3/16">125A</option>
    <option value="3/8x1/16">63A</option>
    <option value="1/2x3/16">100A</option>
  </select>

  <input type="number" step="0.01" id="comprimentoRapido" placeholder="Comprimento (m)">
  <button onclick="calcularRapido()">Adicionar</button>
</div>

<div class="box">
  <h3>Manual</h3>

  <select id="largura">
    <option value="">Largura</option>
    <option>3/8</option>
    <option>1/2</option>
    <option>5/8</option>
    <option>3/4</option>
    <option>7/8</option>
    <option>1</option>
    <option>1.1/4</option>
    <option>1.1/2</option>
    <option>1.3/4</option>
    <option>2</option>
    <option>2.1/4</option>
    <option>2.1/2</option>
    <option>2.3/4</option>
    <option>3</option>
    <option>3.1/4</option>
    <option>3.1/2</option>
    <option>3.3/4</option>
    <option>4</option>
    <option>4.1/2</option>
    <option>5</option>
    <option>5.1/2</option>
  </select>

  <select id="espessura">
    <option value="">Espessura</option>
    <option>1/16</option>
    <option>1/8</option>
    <option>3/16</option>
    <option>1/4</option>
    <option>5/16</option>
    <option>3/8</option>
    <option>1/2</option>
    <option>5/8</option>
  </select>

  <input type="number" step="0.01" id="comprimentoManual" placeholder="Comprimento (m)">
  <button onclick="calcularManual()">Adicionar</button>
</div>

<div class="box">
  <h3>Lista</h3>
  <table>
    <thead>
      <tr>
        <th>Largura</th>
        <th>Espessura</th>
        <th>Comprimento (m)</th>
        <th>Peso (kg)</th>
        <th>Ação</th>
      </tr>
    </thead>
    <tbody id="tabela"></tbody>
  </table>

  <button onclick="limpar()">Limpar Tudo</button>
</div>

<div class="box">
  <h3>Total</h3>
  <p id="resultado" class="total">0 kg</p>
</div>

<script>
let totalKg = 0;
const densidade = 0.00000896;

function parseFracao(str){
  if(str.includes(".")){
    let [inteiro, frac] = str.split(".");
    let [num, den] = frac.split("/");
    return parseFloat(inteiro) + (num/den);
  }
  if(str.includes("/")){
    let [num, den] = str.split("/");
    return num/den;
  }
  return parseFloat(str);
}

function polegadaParaMm(v){ return v * 25.4; }

function formatarFracao(txt){
  return txt.replace(".", " ");
}

function adicionarLinha(l,e,c,peso){
  const tabela = document.getElementById("tabela");

  const linha = document.createElement("tr");

  linha.innerHTML = `
    <td>${formatarFracao(l)}"</td>
    <td>${formatarFracao(e)}"</td>
    <td>${c}</td>
    <td>${peso.toFixed(3)}</td>
    <td><button class="btn-remover" onclick="removerLinha(this, ${peso})">X</button></td>
  `;

  tabela.appendChild(linha);
}

function removerLinha(btn, peso){
  btn.parentElement.parentElement.remove();
  totalKg -= peso;
  atualizar();
}

function limpar(){
  document.getElementById("tabela").innerHTML = "";
  totalKg = 0;
  atualizar();
}

// NOVA FUNÇÃO - OPÇÃO RÁPIDA
function calcularRapido(){
  const modelo = document.getElementById("modelo").value;
  const comp = parseFloat(document.getElementById("comprimentoRapido").value);

  if(!modelo || !comp) return alert("Selecione o modelo e comprimento");

  const [l,e] = modelo.split("x");

  let largura = polegadaParaMm(parseFracao(l));
  let esp = polegadaParaMm(parseFracao(e));
  let comprimento = comp * 1000;

  let peso = largura * esp * comprimento * densidade;

  totalKg += peso;
  adicionarLinha(l,e,comp,peso);
  atualizar();
}

function calcularManual(){
  const l = document.getElementById("largura").value;
  const e = document.getElementById("espessura").value;
  const comp = parseFloat(document.getElementById("comprimentoManual").value);

  if(!l || !e || !comp) return alert("Preencha os campos");

  let largura = polegadaParaMm(parseFracao(l));
  let esp = polegadaParaMm(parseFracao(e));
  let comprimento = comp * 1000;

  let peso = largura * esp * comprimento * densidade;

  totalKg += peso;
  adicionarLinha(l,e,comp,peso);
  atualizar();
}

function atualizar(){
  document.getElementById("resultado").innerText = totalKg.toFixed(3) + " kg";
}
</script>

</body>
</html>
